name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # Use `npm install`, not `npm ci`: Vite 8 / Rolldown pull in
      # platform-specific optional WASM bindings (@rolldown/binding-wasm32-wasi
      # → @emnapi/*) whose pinned versions differ per OS, which makes the strict
      # `npm ci` lockfile check fail across runners. `npm install` reconciles them.
      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build renderer
        run: npm run build

      - name: Smoke test
        run: npx electron . --smoke-test

      - name: Render UI screenshots
        run: |
          npx electron . --screenshot ui-1-light.png --file Welcome.md
          npx electron . --screenshot ui-2-dark.png --dark --file Welcome.md
          npx electron . --screenshot ui-3-menu-open.png --file Welcome.md --open-menu 2

      - name: Upload UI screenshots
        uses: actions/upload-artifact@v4
        with:
          name: ui-screenshots-${{ runner.os }}
          path: ui-*.png
          if-no-files-found: error

      - name: Package
        run: npx electron-builder --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: quill-${{ runner.os }}
          path: |
            release/*.dmg
            release/*.exe
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # installers only — the ui-screenshots artifacts land in the same
          # download directory and must not become release assets
          files: |
            artifacts/*.dmg
            artifacts/*.exe
          generate_release_notes: true
          body: |
            Quill — a refined WYSIWYG Markdown editor.

            **macOS** (`.dmg`, Apple Silicon `arm64` / Intel `x64`): the app is unsigned —
            on first launch, right-click the app and choose **Open**, or run
            `xattr -dr com.apple.quarantine /Applications/Quill.app`.

            **Windows** (`.exe` installer, x64): unsigned — if SmartScreen appears,
            choose **More info → Run anyway**.
