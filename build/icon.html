<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <style>
      html,
      body {
        margin: 0;
        width: 1024px;
        height: 1024px;
        background: transparent;
        overflow: hidden;
      }
      /* macOS Big Sur icon grid: ~824px squircle centered on 1024 canvas */
      .tile {
        position: absolute;
        left: 100px;
        top: 100px;
        width: 824px;
        height: 824px;
        border-radius: 186px;
        background: linear-gradient(165deg, #fffdf7 0%, #f4f1e8 58%, #e9e5d8 100%);
        box-shadow:
          inset 0 -6px 18px rgba(120, 110, 80, 0.18),
          inset 0 4px 10px rgba(255, 255, 255, 0.9);
        display: flex;
        align-items: center;
        justify-content: center;
      }
      /* faint ruled lines, like fine writing paper */
      .tile::before {
        content: '';
        position: absolute;
        inset: 0;
        border-radius: 186px;
        background: repeating-linear-gradient(
          to bottom,
          transparent 0px,
          transparent 78px,
          rgba(60, 90, 160, 0.07) 78px,
          rgba(60, 90, 160, 0.07) 82px
        );
      }
      .mark {
        position: relative;
        font-family: 'Times New Roman', Georgia, serif;
        font-style: italic;
        font-size: 560px;
        line-height: 1;
        color: #23231f;
        text-shadow: 0 10px 24px rgba(0, 0, 0, 0.18);
        transform: translateY(-28px);
      }
      .nib {
        position: absolute;
        right: 196px;
        bottom: 178px;
        width: 96px;
        height: 96px;
        background: #b3541e;
        border-radius: 50% 50% 50% 0;
        transform: rotate(-45deg);
        box-shadow: 0 8px 18px rgba(120, 50, 10, 0.35);
      }
    </style>
  </head>
  <body>
    <div class="tile">
      <div class="mark">Q</div>
      <div class="nib"></div>
    </div>
  </body>
</html>
